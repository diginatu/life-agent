# Life Agent Configuration

settings:
  # Webcam device path
  webcamDevice: /dev/video0

  # Ollama configuration
  ollamaModel: gemma3:12b
  ollamaBaseUrl: http://localhost:11434

  # Output directories
  logDir: ./logs
  captureDir: ./captures

  # Capture resolution
  captureWidth: 640
  captureHeight: 480

  # Number of recent log entries passed to the action LLM for context
  actionHistoryCount: 10

  # Number of days of digest summaries passed to the action LLM (0 = none)
  actionDigestDays: 1

  # Number of days of previous digests passed as context when generating a new digest (0 = none)
  digestContextDays: 3

  # Directory for long-term memory store (learned user patterns)
  memoryDir: ./memory

  # Discord channel ID (set to enable Discord notifications)
  discordChannelId: ""

# Action definitions
# - active: true = triggers Discord notification; false = log-only
# - description: context given to the LLM when selecting actions
# - fallback: notification shown when LLM message drafting fails (required for active actions)
actions:
  none:
    active: false

  log_only:
    active: false

  nudge_break:
    active: true
    description: Suggest the user take a short break from work
    fallback:
      title: Time for a break
      body: You've been working for a while. Consider standing up and stretching.

  nudge_sleep:
    active: true
    description: Suggest the user go to sleep when it's late
    fallback:
      title: Time to wind down
      body: It's getting late. Consider wrapping up and heading to bed.
