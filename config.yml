# Life Agent Configuration

settings:
  # Webcam device path
  webcamDevice: /dev/video0

  # Ollama configuration
  ollamaModel: gemma4:e2b
  ollamaBaseUrl: http://localhost:11434
  # Enable model thinking/reasoning output mode (if supported by the model)
  ollamaThink: false
  # Optional per-node override for the Plan node. If set, the Plan node will
  # use this model instead of the global `ollamaModel`. Leave empty to inherit
  # the global model.
  # planOllamaModel: gemma4:e2b
  # Optional per-node thinking (reasoning) override for the Plan node. When
  # true, the Plan node will enable Ollama's "think" mode regardless of the
  # global `ollamaThink` setting. Leave empty to inherit the global setting.
  # planOllamaThink: false

  # Optional per-layer override for L2 hourly summarization model/think.
  # Leave empty to inherit global ollamaModel/ollamaThink.
  # l2OllamaModel: gemma4:e2b
  # l2OllamaThink: false

  # Optional per-layer override for L3 6-hour summarization model/think.
  # Leave empty to inherit global ollamaModel/ollamaThink.
  # l3OllamaModel: gemma4:e2b
  # l3OllamaThink: false

  # Optional per-layer override for L4 persistent-memory update model/think.
  # Leave empty to inherit global ollamaModel/ollamaThink.
  # l4OllamaModel: gemma4:e2b
  # l4OllamaThink: false

  # Output directories
  logDir: ./logs
  captureDir: ./captures

  # Capture resolution
  captureWidth: 640
  captureHeight: 480

  # Maximum number of capture images to keep on disk (oldest pruned after each capture)
  captureRetentionCount: 10

  # Directory for long-term memory store (learned user patterns)
  memoryDir: ./memory

  # Discord channel ID (set to enable Discord notifications)
  discordChannelId: ""

  # Discord user ID to mention in notifications (e.g. "123456789012345678")
  # Leave empty to disable mentions. Find your ID: Discord > Settings > Advanced > Developer Mode, then right-click your name.
  discordMentionUserId: ""

  # Response style applied to LLM-generated user-visible text (notifications).
  # Free-form: combine language and tone, e.g. "日本語、丁寧で優しい口調" or "French, playful and encouraging".
  responseStyle: English, friendly and concise

  # Hours to delay L2 hourly rollup (keep recent logs in L1)
  l2DelayHours: 1

  # Hours to delay L3 6-hour bucket rollup (keep recent L2 entries unmerged)
  l3DelayHours: 6

  # Maximum number of L2 hourly entries to keep in store
  l2MaxRetention: 48

  # Maximum number of L3 6-hour entries to keep in store
  l3MaxRetention: 28

  # Hours to delay L4 distillation after each L3 window ends
  l4DelayHours: 24

  # L4 persistent memory: max char size of the distilled text
  l4MaxChars: 2000

# Action definitions
# - active: true = triggers Discord notification; false = logged only, no notification
# - description: seed value for LLM context; evolved at runtime via memory store
# - fallback: notification shown when LLM message drafting fails (required for active actions)
actions:
  none:
    active: false

  nudge_break:
    active: true
    description: Suggest the user take a short break from work
    fallback:
      body: Time for a break — you've been working for a while. Consider standing up and stretching.

  nudge_sleep:
    active: true
    description: Suggest the user go to sleep when it's late
    fallback:
      body: Time to wind down — it's getting late. Consider wrapping up and heading to bed.

  replan-next:
    active: false
    description: Internal control action to refresh the 24-hour plan on the next cycle when context changes.
